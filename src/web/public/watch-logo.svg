<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="lg-bezel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4D4D4"/>
      <stop offset="40%" stop-color="#F0F0F0"/>
      <stop offset="100%" stop-color="#A8A8A8"/>
    </linearGradient>
    <linearGradient id="lg-face" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="lg-band" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b7fc7"/>
      <stop offset="100%" stop-color="#344e82"/>
    </linearGradient>
    <linearGradient id="lg-accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Top band/strap -->
  <path d="M100 12 L108 8 L148 8 L156 12 L156 60 Q156 64 152 64 L104 64 Q100 64 100 60 Z" fill="url(#lg-band)" filter="url(#shadow)"/>
  <line x1="118" y1="20" x2="118" y2="56" stroke="#4a6fa5" stroke-width="1" opacity="0.5"/>
  <line x1="128" y1="16" x2="128" y2="56" stroke="#4a6fa5" stroke-width="1" opacity="0.5"/>
  <line x1="138" y1="20" x2="138" y2="56" stroke="#4a6fa5" stroke-width="1" opacity="0.5"/>

  <!-- Bottom band/strap -->
  <path d="M100 192 Q100 192 104 192 L152 192 Q156 192 156 196 L156 244 L148 248 L108 248 L100 244 Z" fill="url(#lg-band)" filter="url(#shadow)"/>
  <line x1="118" y1="200" x2="118" y2="240" stroke="#4a6fa5" stroke-width="1" opacity="0.5"/>
  <line x1="128" y1="200" x2="128" y2="244" stroke="#4a6fa5" stroke-width="1" opacity="0.5"/>
  <line x1="138" y1="200" x2="138" y2="240" stroke="#4a6fa5" stroke-width="1" opacity="0.5"/>

  <!-- Watch case (outer bezel) -->
  <circle cx="128" cy="128" r="82" fill="url(#lg-bezel)" filter="url(#shadow)" stroke="#999" stroke-width="1"/>

  <!-- Bezel ring detail -->
  <circle cx="128" cy="128" r="76" fill="none" stroke="#bbb" stroke-width="1"/>

  <!-- Watch face -->
  <circle cx="128" cy="128" r="72" fill="url(#lg-face)"/>

  <!-- Subtle chapter ring -->
  <circle cx="128" cy="128" r="68" fill="none" stroke="#2a3a5c" stroke-width="1"/>

  <!-- Hour markers (cardinal) -->
  <rect x="126" y="64" width="4" height="16" rx="2" fill="url(#lg-accent)" filter="url(#glow)"/>
  <rect x="126" y="176" width="4" height="16" rx="2" fill="url(#lg-accent)" filter="url(#glow)"/>
  <rect x="176" y="126" width="16" height="4" rx="2" fill="url(#lg-accent)" filter="url(#glow)"/>
  <rect x="64" y="126" width="16" height="4" rx="2" fill="url(#lg-accent)" filter="url(#glow)"/>

  <!-- Minor hour markers (applied indices) -->
  <rect x="152.5" y="70" width="3" height="10" rx="1.5" fill="#556" transform="rotate(30 128 128)"/>
  <rect x="152.5" y="70" width="3" height="10" rx="1.5" fill="#556" transform="rotate(60 128 128)"/>
  <rect x="152.5" y="70" width="3" height="10" rx="1.5" fill="#556" transform="rotate(120 128 128)"/>
  <rect x="152.5" y="70" width="3" height="10" rx="1.5" fill="#556" transform="rotate(150 128 128)"/>
  <rect x="152.5" y="70" width="3" height="10" rx="1.5" fill="#556" transform="rotate(210 128 128)"/>
  <rect x="152.5" y="70" width="3" height="10" rx="1.5" fill="#556" transform="rotate(240 128 128)"/>
  <rect x="152.5" y="70" width="3" height="10" rx="1.5" fill="#556" transform="rotate(300 128 128)"/>
  <rect x="152.5" y="70" width="3" height="10" rx="1.5" fill="#556" transform="rotate(330 128 128)"/>

  <!-- Date window -->
  <rect x="156" y="123" width="18" height="12" rx="2" fill="#1e2d4d" stroke="#445" stroke-width="0.5"/>
  <text x="165" y="132.5" font-family="Arial, sans-serif" font-size="9" fill="#ddd" text-anchor="middle">03</text>

  <!-- Hour hand (10:10 position for classic look) -->
  <path d="M126 130 L124 96 L128 84 L132 96 L130 130 Z" fill="#E0E0E0" stroke="#ccc" stroke-width="0.5" transform="rotate(-60 128 128)"/>

  <!-- Minute hand -->
  <path d="M127 130 L125.5 88 L128 72 L130.5 88 L129 130 Z" fill="#E0E0E0" stroke="#ccc" stroke-width="0.5" transform="rotate(60 128 128)"/>

  <!-- Second hand -->
  <g transform="rotate(180 128 128)">
    <line x1="128" y1="142" x2="128" y2="70" stroke="#E63946" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="128" cy="142" r="3" fill="#E63946"/>
  </g>

  <!-- Center pin -->
  <circle cx="128" cy="128" r="5" fill="url(#lg-accent)"/>
  <circle cx="128" cy="128" r="2" fill="#222"/>

  <!-- Crown (winding knob) -->
  <rect x="208" y="121" width="16" height="14" rx="4" fill="url(#lg-bezel)" stroke="#999" stroke-width="1"/>
  <line x1="212" y1="125" x2="212" y2="133" stroke="#bbb" stroke-width="0.5"/>
  <line x1="215" y1="125" x2="215" y2="133" stroke="#bbb" stroke-width="0.5"/>
  <line x1="218" y1="125" x2="218" y2="133" stroke="#bbb" stroke-width="0.5"/>
  <line x1="221" y1="125" x2="221" y2="133" stroke="#bbb" stroke-width="0.5"/>
</svg>

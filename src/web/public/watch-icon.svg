<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bezel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0C0C0"/>
      <stop offset="50%" stop-color="#E8E8E8"/>
      <stop offset="100%" stop-color="#A0A0A0"/>
    </linearGradient>
    <linearGradient id="face" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="band" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a6fa5"/>
      <stop offset="100%" stop-color="#2c3e6b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>
  </defs>

  <!-- Top band/strap -->
  <rect x="96" y="8" width="64" height="52" rx="8" fill="url(#band)"/>
  <!-- Bottom band/strap -->
  <rect x="96" y="196" width="64" height="52" rx="8" fill="url(#band)"/>

  <!-- Watch case (outer bezel) -->
  <circle cx="128" cy="128" r="80" fill="url(#bezel)" stroke="#888" stroke-width="2"/>

  <!-- Watch face -->
  <circle cx="128" cy="128" r="70" fill="url(#face)"/>

  <!-- Hour markers -->
  <rect x="126" y="64" width="4" height="14" rx="2" fill="url(#accent)"/>    <!-- 12 -->
  <rect x="126" y="178" width="4" height="14" rx="2" fill="url(#accent)"/>   <!-- 6 -->
  <rect x="178" y="126" width="14" height="4" rx="2" fill="url(#accent)"/>   <!-- 3 -->
  <rect x="64" y="126" width="14" height="4" rx="2" fill="url(#accent)"/>    <!-- 9 -->

  <!-- Minor hour markers -->
  <circle cx="155" cy="72" r="3" fill="#667"/>   <!-- 1 -->
  <circle cx="176" cy="96" r="3" fill="#667"/>   <!-- 2 -->
  <circle cx="176" cy="160" r="3" fill="#667"/>  <!-- 4 -->
  <circle cx="155" cy="184" r="3" fill="#667"/>  <!-- 5 -->
  <circle cx="101" cy="184" r="3" fill="#667"/>  <!-- 7 -->
  <circle cx="80" cy="160" r="3" fill="#667"/>   <!-- 8 -->
  <circle cx="80" cy="96" r="3" fill="#667"/>    <!-- 10 -->
  <circle cx="101" cy="72" r="3" fill="#667"/>   <!-- 11 -->

  <!-- Hour hand (pointing ~10:10 position) -->
  <line x1="128" y1="128" x2="106" y2="88" stroke="#E8E8E8" stroke-width="5" stroke-linecap="round"/>

  <!-- Minute hand -->
  <line x1="128" y1="128" x2="156" y2="84" stroke="#E8E8E8" stroke-width="3" stroke-linecap="round"/>

  <!-- Second hand -->
  <line x1="128" y1="138" x2="128" y2="74" stroke="#FF4444" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Center pin -->
  <circle cx="128" cy="128" r="5" fill="url(#accent)"/>
  <circle cx="128" cy="128" r="2.5" fill="#333"/>

  <!-- Crown (winding knob) -->
  <rect x="206" y="122" width="14" height="12" rx="3" fill="url(#bezel)" stroke="#888" stroke-width="1"/>
</svg>
